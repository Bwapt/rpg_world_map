<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <title>RPG World Map</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

  <!-- Geoman -->
  <link rel="stylesheet" href="https://unpkg.com/@geoman-io/leaflet-geoman-free@latest/dist/leaflet-geoman.css" />

  <link rel="stylesheet" href="css/style.css?v=2" />
</head>

<body>
  <button id="menu-toggle" class="menu-toggle" type="button" aria-expanded="false" aria-controls="world-panel">
    <span></span>
    <span></span>
    <span></span>
  </button>

  <div id="current-map-title" class="current-map-title"></div>

  <aside id="world-panel" class="world-panel" aria-hidden="true">
    <div class="world-panel__header">
      <h1>Maps</h1>
    </div>
    <div id="world-tree" class="world-tree"></div>
    <button id="add-map-button" class="world-panel__add" type="button">Ajouter une map</button>
  </aside>

  <div id="map"></div>
  <div id="modal-root" class="modal-root"></div>

  <!-- Leaflet (global lib obligatoire) -->
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <!-- Geoman -->
  <script src="https://unpkg.com/@geoman-io/leaflet-geoman-free@latest/dist/leaflet-geoman.min.js"></script>

  <script type="module" src="js/app.js"></script>
</body>

</html>
