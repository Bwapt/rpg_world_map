<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>RPG World Map</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

  <!-- Geoman -->
  <link rel="stylesheet" href="https://unpkg.com/@geoman-io/leaflet-geoman-free@latest/dist/leaflet-geoman.css" />

  <link rel="stylesheet" href="css/style.css" />
</head>

<body>
  <button id="menu-toggle" class="menu-toggle" type="button" aria-expanded="false" aria-controls="world-panel">
    <span></span>
    <span></span>
    <span></span>
  </button>
  <button id="fullscreen-toggle" class="fullscreen-toggle" type="button" aria-label="Passer en plein ecran" title="Passer en plein ecran">
    <span class="fullscreen-toggle__icon" aria-hidden="true">
      <span></span>
      <span></span>
      <span></span>
      <span></span>
    </span>
  </button>

  <div id="current-map-title" class="current-map-title"></div>

  <aside id="world-panel" class="world-panel" aria-hidden="true">
    <div class="world-panel__header">
      <h1>RPG World Map</h1>
    </div>
    <div id="world-tree" class="world-tree"></div>
    <button id="add-map-button" class="world-panel__add" type="button">Ajouter une map</button>
  </aside>

  <div id="map"></div>
  <div id="map-loading" class="map-loading is-visible is-indeterminate" aria-hidden="false">
    <div class="map-loading__panel">
      <div class="map-loading__brand">RPG WORLD MAP</div>
      <div class="map-loading__meta">
        <span>Chargement de la map</span>
        <span data-map-loading-label>Chargement</span>
      </div>
      <div class="map-loading__track">
        <div class="map-loading__bar" data-map-loading-bar></div>
      </div>
    </div>
  </div>
  <div id="modal-root" class="modal-root"></div>

  <!-- Leaflet (global lib obligatoire) -->
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <!-- Geoman -->
  <script src="https://unpkg.com/@geoman-io/leaflet-geoman-free@latest/dist/leaflet-geoman.min.js"></script>

  <script type="module" src="js/app.js"></script>
</body>

</html>
