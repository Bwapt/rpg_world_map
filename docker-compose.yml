services:
  backend:
    build:
      context: ./backend
    container_name: rpg-world-map-backend
    restart: unless-stopped
    ports:
      - "8001:8001"
    volumes:
      - ./backend/data:/app/data
      - ./frontend/assets/maps:/app/frontend/assets/maps
    networks:
      - rpg-world-map

  frontend:
    build:
      context: ./frontend
    container_name: rpg-world-map-frontend
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./frontend/assets/maps:/usr/share/nginx/html/assets/maps:ro
    networks:
      - rpg-world-map

  nginx:
    image: nginx:1.27-alpine
    container_name: rpg-world-map-nginx
    restart: unless-stopped
    profiles:
      - nginx
    depends_on:
      - backend
      - frontend
    ports:
      - "${NGINX_HTTP_PORT:-8080}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - rpg-world-map

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: rpg-world-map-cloudflared
    restart: unless-stopped
    profiles:
      - tunnel
    depends_on:
      - nginx
    command: tunnel --no-autoupdate run --token ${CLOUDFLARED_TOKEN:-missing_token}
    network_mode: host
    networks:
      - rpg-world-map

networks:
  rpg-world-map:
    name: rpg-world-map
